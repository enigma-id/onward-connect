<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Background Glows -->
    <radialGradient id="glowTop" cx="40%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottom" cx="60%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters for glowing paths -->
    <filter id="blurNeon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Map Dot Grid (Simulates a tracking radar or control center) -->
    <pattern id="dotGrid" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="#064e3b" opacity="0.6"/>
      <path d="M 0 30 L 60 30 M 30 0 L 30 60" stroke="#064e3b" stroke-width="0.5" stroke-dasharray="2 6" opacity="0.2"/>
    </pattern>
    
    <!-- GPS Location Marker Node -->
    <g id="gpsMarker">
      <circle cx="0" cy="0" r="7" fill="#10b981"/>
      <circle cx="0" cy="0" r="4" fill="#6ee7b7"/>
    </g>
  </defs>

  <!-- Base Grid Background -->
  <rect width="1920" height="1080" fill="#022c22" />
  <rect width="1920" height="1080" fill="url(#dotGrid)" />
  <rect width="1920" height="1080" fill="url(#glowTop)" />
  <rect width="1920" height="1080" fill="url(#glowBottom)" />

  <!-- Abstract Topographic / Geofence Lines -->
  <g stroke="#064e3b" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M -100 200 Q 400 400 900 100 T 2000 300" />
    <path d="M -100 240 Q 400 440 900 140 T 2000 340" />
    <path d="M -100 800 Q 500 600 1100 900 T 2000 700" />
    <path d="M -100 840 Q 500 640 1100 940 T 2000 740" />
  </g>

  <!-- Highways / Intercity Routes -->
  <g stroke="#10b981" stroke-width="2.5" fill="none" opacity="0.2" filter="url(#blurNeon)">
    <!-- Primary Horizontal Route -->
    <path d="M -200 600 C 300 400 700 800 1200 400 S 1700 200 2100 600" />
    <!-- Secondary Diagonal Route -->
    <path d="M 2100 200 C 1500 300 1300 900 800 600 S 200 400 -200 800" />
    <!-- Vertical Crossing Route (Left) -->
    <path d="M 400 -200 C 600 300 300 700 800 1200" />
    <!-- Vertical Crossing Route (Right) -->
    <path d="M 1600 1300 C 1400 800 1700 400 1200 -200" />
  </g>

  <!-- Connective Local Road Segments -->
  <g stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.15">
    <path d="M 800 600 L 1200 400" stroke-dasharray="5 10"/>
    <path d="M 390 530 L 610 395" stroke-dasharray="5 10"/>
    <path d="M 1370 725 L 1570 365" stroke-dasharray="5 10"/>
  </g>

  <!-- Animated Active Vehicles (Data Streams / Deliveries along routes) -->
  <g fill="none" stroke-width="4" filter="url(#glowStrong)" stroke-linecap="round">
    
    <!-- Vehicle 1 on Pri. Route -->
    <path d="M -200 600 C 300 400 700 800 1200 400 S 1700 200 2100 600" stroke="#6ee7b7" stroke-dasharray="15 4000" opacity="0.9">
      <animate attributeName="stroke-dashoffset" from="4015" to="0" dur="10s" repeatCount="indefinite" />
    </path>
    <!-- Vehicle 2 on Pri. Route -->
    <path d="M -200 600 C 300 400 700 800 1200 400 S 1700 200 2100 600" stroke="#10b981" stroke-dasharray="25 4500" opacity="0.8">
      <animate attributeName="stroke-dashoffset" from="4525" to="0" dur="14s" repeatCount="indefinite" />
    </path>

    <!-- Vehicle on Sec. Route (Moving right to left because offset goes from 0 to 4000) -->
    <path d="M 2100 200 C 1500 300 1300 900 800 600 S 200 400 -200 800" stroke="#34d399" stroke-dasharray="20 4000" opacity="0.9">
      <animate attributeName="stroke-dashoffset" from="0" to="-4020" dur="12s" repeatCount="indefinite" />
    </path>

    <!-- Vehicle on Vert. Left Route -->
    <path d="M 400 -200 C 600 300 300 700 800 1200" stroke="#6ee7b7" stroke-dasharray="15 3500" opacity="0.8">
      <animate attributeName="stroke-dashoffset" from="3515" to="0" dur="9s" repeatCount="indefinite" />
    </path>

    <!-- Vehicle on Vert. Right Route -->
    <path d="M 1600 1300 C 1400 800 1700 400 1200 -200" stroke="#10b981" stroke-dasharray="15 3500" opacity="0.9">
      <animate attributeName="stroke-dashoffset" from="3515" to="0" dur="11s" repeatCount="indefinite" />
    </path>
    
    <!-- Heavy Truck Simulation (Multiple dash points) -->
    <path d="M -200 600 C 300 400 700 800 1200 400 S 1700 200 2100 600" stroke="#34d399" stroke-dasharray="4 6 4 4500" stroke-width="5" opacity="0.8">
      <animate attributeName="stroke-dashoffset" from="2250" to="-2250" dur="18s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- GPS Nodes / Hub Cities -->
  <g filter="url(#glowStrong)">
    <!-- Major Hub 1 -->
    <use href="#gpsMarker" x="1200" y="400" />
    <!-- GPS radar ping -->
    <circle cx="1200" cy="400" r="10" fill="none" stroke="#6ee7b7" stroke-width="2" opacity="0">
      <animate attributeName="r" values="10;80" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="3s" repeatCount="indefinite" />
    </circle>

    <!-- Major Hub 2 -->
    <use href="#gpsMarker" x="800" y="600" />
    <!-- GPS radar ping -->
    <circle cx="800" cy="600" r="10" fill="none" stroke="#6ee7b7" stroke-width="2" opacity="0">
      <animate attributeName="r" values="10;70" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0" dur="2.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Secondary Nodes (along the routes) -->
    <use href="#gpsMarker" x="390" y="530" />
    <circle cx="390" cy="530" r="10" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0">
      <animate attributeName="r" values="8;40" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite" />
    </circle>

    <use href="#gpsMarker" x="610" y="395" />
    <use href="#gpsMarker" x="1570" y="365" />
    <use href="#gpsMarker" x="1370" y="725" />
  </g>

  <!-- Satellite Fleet Connection Lines (GPS signals beaming from hubs up towards space) -->
  <g stroke="#34d399" stroke-width="1" stroke-dasharray="4 8" fill="none" opacity="0.3">
    <path d="M 1200 400 L 1200 -100" />
    <path d="M 800 600 L 800 -100" />
    <path d="M 1570 365 L 1570 -100" />
  </g>
  
  <g filter="url(#glowStrong)">
    <circle cx="1200" cy="400" r="3" fill="#6ee7b7">
        <animate attributeName="cy" values="400;0" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="600" r="3" fill="#6ee7b7">
        <animate attributeName="cy" values="600;0" dur="2.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="1570" cy="365" r="3" fill="#6ee7b7">
        <animate attributeName="cy" values="365;0" dur="1.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0" dur="1.8s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
