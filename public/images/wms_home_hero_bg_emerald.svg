<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Ambient Glows -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="20%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Path Gradient -->
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Blurs for Neon Effect -->
    <filter id="blurNeon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="blurStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Technical Grid -->
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#064e3b" stroke-width="1" stroke-opacity="0.5"/>
      <!-- Grid intersect dots -->
      <path d="M -2 0 L 2 0 M 0 -2 L 0 2" stroke="#059669" stroke-width="1" />
    </pattern>

    <!-- Node Pattern (Warehouse/Hub) -->
    <g id="hub">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#34d399" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" fill="#10b981"/>
    </g>

    <g id="warehouse-block">
      <rect x="-15" y="-15" width="30" height="30" fill="none" stroke="#059669" stroke-width="1.5" rx="4" />
      <rect x="-8" y="-8" width="16" height="16" fill="#10b981" rx="2" />
    </g>
  </defs>

  <!-- Background Base (Emerald 950) -->
  <rect width="1920" height="1080" fill="#022c22" />
  <rect width="1920" height="1080" fill="url(#grid)" />
  <rect width="1920" height="1080" fill="url(#glowCenter)" />
  <rect width="1920" height="1080" fill="url(#glowRight)" />
  <rect width="1920" height="1080" fill="url(#glowLeft)" />

  <!-- Logistics Network Connecting Lines -->
  <!-- Represents distribution flows: straight lines for strict warehouse aisles, and long curves for larger transport routes -->
  <g stroke="url(#pathGrad)" stroke-width="2" fill="none" opacity="0.3" filter="url(#blurNeon)">
    <!-- Central Hub to Outer Nodes (Curved Logistics arcs) -->
    <path d="M 960 540 Q 600 300 400 300" />
    <path d="M 960 540 Q 1300 300 1500 200" />
    <path d="M 960 540 Q 1200 700 1400 850" />
    <path d="M 960 540 Q 700 700 350 800" />
    <path d="M 960 540 L 960 150" />
    <path d="M 960 540 L 960 950" />
    
    <!-- Outer Connections -->
    <path d="M 400 300 L 700 150" />
    <path d="M 1500 200 L 1600 450" />
    <path d="M 1400 850 L 1600 850" />
    <path d="M 350 800 L 600 650" />
    <path d="M 600 650 L 400 300" />
  </g>

  <!-- Warehouse Aisle Grids (Rigid orthogonal paths) -->
  <g stroke="#064e3b" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 200 400 L 300 400 L 300 500 L 200 500 Z" />
    <path d="M 220 420 L 280 420" />
    <path d="M 220 450 L 280 450" />
    <path d="M 220 480 L 280 480" />

    <path d="M 1600 250 L 1700 250 L 1700 350 L 1600 350 Z" />
    <path d="M 1620 270 L 1680 270" />
    <path d="M 1620 300 L 1680 300" />
    <path d="M 1620 330 L 1680 330" />
  </g>

  <!-- Animated Pulses/Data Packages (Logistics Movement) -->
  <g fill="none" stroke="#ffffff" stroke-width="3" filter="url(#blurNeon)" stroke-linecap="round">
    <!-- Stream 1 -->
    <path d="M 960 540 Q 600 300 400 300" stroke-dasharray="10 600" opacity="0.8">
      <animate attributeName="stroke-dashoffset" from="610" to="0" dur="3s" repeatCount="indefinite" />
    </path>
    <!-- Stream 2 -->
    <path d="M 960 540 Q 1300 300 1500 200" stroke-dasharray="15 700" opacity="0.7">
      <animate attributeName="stroke-dashoffset" from="715" to="0" dur="3.5s" repeatCount="indefinite" />
    </path>
    <!-- Stream 3 -->
    <path d="M 1400 850 Q 1200 700 960 540" stroke-dasharray="12 600" opacity="0.7">
      <animate attributeName="stroke-dashoffset" from="612" to="0" dur="2.8s" repeatCount="indefinite" />
    </path>
    <!-- Stream 4 (Warehouse orthogonal path simulation) -->
    <path d="M 100 900 L 300 900 L 300 700 L 500 700" stroke-dasharray="8 600" stroke="#6ee7b7" stroke-width="2">
       <animate attributeName="stroke-dashoffset" from="608" to="0" dur="4s" repeatCount="indefinite" />
    </path>
    <!-- Stream 5 -->
    <path d="M 1800 600 L 1600 600 L 1600 450 L 1500 200" stroke-dasharray="10 700" stroke="#34d399" stroke-width="2.5">
       <animate attributeName="stroke-dashoffset" from="0" to="-710" dur="5s" repeatCount="indefinite" />
    </path>
    <!-- Main Center Vertical Stream -->
    <path d="M 960 150 L 960 540 L 960 950" stroke-dasharray="20 400" stroke="#10b981" stroke-width="2" opacity="0.6">
        <animate attributeName="stroke-dashoffset" from="800" to="0" dur="6s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Network Nodes (Hubs & Warehouses) -->
  <g filter="url(#blurNeon)">
    <!-- Central Hub (Represents the "Connect" system integrating both) -->
    <use href="#warehouse-block" x="960" y="540">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
    </use>
    <!-- Pulse ring for central hub -->
    <circle cx="960" cy="540" r="30" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="20;60;20" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Secondary Nodes (Warehouses / Vehicles) -->
    <use href="#hub" x="400" y="300" />
    <use href="#hub" x="1500" y="200" />
    <use href="#hub" x="1400" y="850" />
    <use href="#hub" x="350" y="800" />
    
    <use href="#warehouse-block" x="600" y="650" />
    <use href="#warehouse-block" x="1600" y="450" />
    
    <!-- Minor connection points -->
    <circle cx="700" cy="150" r="4" fill="#34d399" />
    <circle cx="960" cy="150" r="4" fill="#34d399" />
    <circle cx="960" cy="950" r="4" fill="#34d399" />
    <circle cx="1600" cy="850" r="4" fill="#34d399" />
    
    <!-- Little blinking lights -->
    <circle cx="210" cy="410" r="2" fill="#6ee7b7">
        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="1690" cy="340" r="2" fill="#6ee7b7">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>
  
</svg>
