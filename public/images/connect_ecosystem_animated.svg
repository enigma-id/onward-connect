<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Filters for glows & 3D shadows -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.2" />
    </filter>
    <filter id="glowCenter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowNode" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowIcon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <radialGradient id="hubGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </radialGradient>
    
    <!-- 3D Sphere Base Gradient -->
    <radialGradient id="glassSphereBase" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#f8fafc" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.95" />
    </radialGradient>
  </defs>

  <!-- Orbital Rings Backdrop (Top-down 2D view, no tilt) -->
  <g fill="none" stroke="#e2e8f0" stroke-width="1.5">
    <circle cx="400" cy="400" r="180" stroke-dasharray="10 15">
      <animateTransform attributeName="transform" type="rotate" from="0 400 400" to="360 400 400" dur="25s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="400" r="280" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="30 40 5 40">
      <animateTransform attributeName="transform" type="rotate" from="360 400 400" to="0 400 400" dur="35s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Connecting Lines -->
  <g stroke="#cbd5e1" stroke-width="3" opacity="0.4" stroke-dasharray="5 8">
    <line x1="400" y1="400" x2="200" y2="200" />
    <line x1="400" y1="400" x2="600" y2="200" />
    <line x1="400" y1="400" x2="200" y2="600" />
    <line x1="400" y1="400" x2="600" y2="600" />
    <line x1="200" y1="200" x2="600" y2="200" opacity="0.5" />
    <line x1="600" y1="200" x2="600" y2="600" opacity="0.5" />
    <line x1="600" y1="600" x2="200" y2="600" opacity="0.5" />
    <line x1="200" y1="600" x2="200" y2="200" opacity="0.5" />
  </g>

  <!-- Animated Data Streams -->
  <g fill="none" stroke-width="5">
    <path d="M 400 400 L 200 200" stroke="#10b981" stroke-dasharray="25 285" opacity="0.9">
      <animate attributeName="stroke-dashoffset" from="310" to="0" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M 400 400 L 600 200" stroke="#f59e0b" stroke-dasharray="25 285" opacity="0.9">
      <animate attributeName="stroke-dashoffset" from="310" to="0" dur="2.4s" repeatCount="indefinite" />
    </path>
    <path d="M 400 400 L 200 600" stroke="#0ea5e9" stroke-dasharray="25 285" opacity="0.9">
      <animate attributeName="stroke-dashoffset" from="310" to="0" dur="1.8s" repeatCount="indefinite" />
    </path>
    <path d="M 400 400 L 600 600" stroke="#ec4899" stroke-dasharray="25 285" opacity="0.9">
      <animate attributeName="stroke-dashoffset" from="310" to="0" dur="2.8s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- MASSIVE CORE CONNECT HUB -->
  <g transform="translate(400, 400)">
    <circle r="60" fill="none" stroke="#10b981" stroke-width="4">
      <animate attributeName="r" values="60;160" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <path d="M 0 -75 L 65 -37.5 L 65 37.5 L 0 75 L -65 37.5 L -65 -37.5 Z" fill="url(#hubGradient)" filter="url(#glowCenter)" />
    <path d="M 0 -62 L 53.7 -31 L 53.7 31 L 0 62 L -53.7 31 L -53.7 -31 Z" fill="#ffffff" opacity="0.98" />
    
    <image href="data:image/png;base64," x="-38" y="-38" width="76" height="76" />
  </g>

  <!-- 3D SATELLITE 1: PANTAUAN GUDANG (Top Left) -->
  <g transform="translate(200, 200)" filter="url(#dropShadow)">
    <animateTransform attributeName="transform" type="translate" values="200,200; 200,195; 200,200" dur="4s" repeatCount="indefinite" />
    
    <!-- 3D Glass Sphere Node Base (r=48) -->
    <circle r="48" fill="url(#glassSphereBase)" stroke="#10b981" stroke-width="2" />
    <circle r="43" fill="none" stroke="#10b981" stroke-width="2" opacity="0.3" />
    
    <!-- Clean Premium Icon (Gudang/Package) -->
    <g transform="translate(-20, -20) scale(1.6)" stroke="#047857" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glowIcon)">
      <path d="M16.5 9.4 7.5 4.21" />
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
      <path d="M3.27 6.96 12 12.01l8.73-5.05" />
      <path d="M12 22.08V12" />
    </g>
    
    <!-- Text Label -->
    <text x="0" y="70" font-family="sans-serif" font-weight="800" font-size="16" fill="#0f172a" text-anchor="middle" letter-spacing="1">GUDANG</text>
  </g>

  <!-- 3D SATELLITE 2: OPTIMALISASI RUTE (Top Right) -->
  <g transform="translate(600, 200)" filter="url(#dropShadow)">
    <animateTransform attributeName="transform" type="translate" values="600,200; 600,195; 600,200" dur="3.5s" repeatCount="indefinite" />
    
    <!-- 3D Glass Sphere Node Base -->
    <circle r="48" fill="url(#glassSphereBase)" stroke="#f59e0b" stroke-width="2" />
    <circle r="43" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3" />
    
    <!-- Clean Premium Icon (Rute/Map Pin) -->
    <g transform="translate(-19, -23) scale(1.6)" stroke="#b45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glowIcon)">
       <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 0-16 0Z" />
       <circle cx="12" cy="10" r="3" />
    </g>
    
    <!-- Text Label -->
    <text x="0" y="70" font-family="sans-serif" font-weight="800" font-size="16" fill="#0f172a" text-anchor="middle" letter-spacing="1">RUTE</text>
  </g>

  <!-- 3D SATELLITE 3: PENGELOLAAN ARMADA (Bottom Left) -->
  <g transform="translate(200, 600)" filter="url(#dropShadow)">
    <animateTransform attributeName="transform" type="translate" values="200,600; 200,595; 200,600" dur="4.5s" repeatCount="indefinite" />
    
    <!-- 3D Glass Sphere Node Base -->
    <circle r="48" fill="url(#glassSphereBase)" stroke="#0ea5e9" stroke-width="2" />
    <circle r="43" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.3" />
    
    <!-- Clean Premium Icon (Armada/Truck) -->
    <g transform="translate(-19, -20) scale(1.6)" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glowIcon)">
       <path d="M10 17h4V5H2v12h3" />
       <path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5" />
       <path d="M14 17h1" />
       <circle cx="7.5" cy="17.5" r="2.5" />
       <circle cx="17.5" cy="17.5" r="2.5" />
    </g>
    
    <!-- Text Label -->
    <text x="0" y="70" font-family="sans-serif" font-weight="800" font-size="16" fill="#0f172a" text-anchor="middle" letter-spacing="1">ARMADA</text>
  </g>

  <!-- 3D SATELLITE 4: KEPUASAN PELANGGAN (Bottom Right) -->
  <g transform="translate(600, 600)" filter="url(#dropShadow)">
    <animateTransform attributeName="transform" type="translate" values="600,600; 600,595; 600,600" dur="3.8s" repeatCount="indefinite" />
    
    <!-- 3D Glass Sphere Node Base -->
    <circle r="48" fill="url(#glassSphereBase)" stroke="#ec4899" stroke-width="2" />
    <circle r="43" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.3" />
    
    <!-- Clean Premium Icon (Pelanggan/User Check) -->
    <g transform="translate(-19, -22) scale(1.6)" stroke="#be185d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glowIcon)">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
      <circle cx="9" cy="7" r="4" />
      <polyline points="16 11 18 13 22 9" />
    </g>

    <!-- Text Label -->
    <text x="0" y="70" font-family="sans-serif" font-weight="800" font-size="16" fill="#0f172a" text-anchor="middle" letter-spacing="1">PELANGGAN</text>
  </g>

</svg>
