<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurNeon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background (Emerald 950) -->
  <rect width="1920" height="1080" fill="#022c22" />
  <rect width="1920" height="1080" fill="url(#glowCenter)" />

  <!-- Abstract Connections -->
  <g stroke="#34d399" stroke-width="1.5" opacity="0.3" fill="none" filter="url(#blurNeon)">
    <circle cx="960" cy="540" r="300" stroke-dasharray="10 20">
      <animateTransform attributeName="transform" type="rotate" from="0 960 540" to="360 960 540" dur="40s" repeatCount="indefinite" />
    </circle>
    <circle cx="960" cy="540" r="500" stroke-dasharray="5 15">
      <animateTransform attributeName="transform" type="rotate" from="360 960 540" to="0 960 540" dur="60s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Animated Pulses -->
  <circle cx="960" cy="540" r="10" fill="#ffffff" opacity="0.6">
    <animate attributeName="r" values="0;200" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="960" cy="540" r="10" fill="#ffffff" opacity="0.6">
    <animate attributeName="r" values="0;200" dur="4s" begin="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0" dur="4s" begin="2s" repeatCount="indefinite" />
  </circle>

  <!-- Floating Nodes -->
  <g fill="#34d399">
    <circle cx="660" cy="340" r="4">
      <animate attributeName="cy" values="340;360;340" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="1260" cy="740" r="3">
      <animate attributeName="cy" values="740;720;740" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
