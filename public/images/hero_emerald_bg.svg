<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurNeon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#064e3b" stroke-width="1" stroke-opacity="0.4"/>
      <circle cx="60" cy="60" r="1.5" fill="#065f46" />
    </pattern>
  </defs>

  <!-- Base background (Emerald 950) -->
  <rect width="1920" height="1080" fill="#022c22" />

  <!-- Tech Grid Background -->
  <rect width="1920" height="1080" fill="url(#grid)" />

  <!-- Ambient Glowing Orbs -->
  <rect width="1920" height="1080" fill="url(#glow1)" />
  <rect width="1920" height="1080" fill="url(#glow2)" />

  <!-- Abstract Network and Route Lines -->
  <g stroke="url(#lineGrad)" stroke-width="2" fill="none" filter="url(#blurNeon)">
    <path d="M-100 200 C 300 100, 500 500, 800 300 S 1400 100, 1600 400 S 2000 800, 2100 600" />
    <path d="M-50 800 C 400 900, 700 400, 1000 600 S 1600 700, 1800 900 S 2000 1000, 2100 900" stroke-opacity="0.5"/>

    <!-- Connecting branches -->
    <path d="M800 300 L 1000 600" stroke-width="1" stroke-dasharray="8,8" opacity="0.4" />
    <path d="M1600 400 L 1800 900" stroke-width="1" stroke-dasharray="12,6" opacity="0.3" />
    <path d="M500 700 L 500 500" stroke-width="1" opacity="0.2" />
  </g>

  <!-- Network Map Nodes -->
  <g fill="#34d399" filter="url(#blurNeon)">
    <circle cx="800" cy="300" r="8" />
    <circle cx="800" cy="300" r="20" fill="none" stroke="#34d399" stroke-width="1" />

    <circle cx="1600" cy="400" r="6" />

    <circle cx="1000" cy="600" r="9" />
    <circle cx="1000" cy="600" r="28" fill="none" stroke="#34d399" stroke-width="0.5" />

    <circle cx="1800" cy="900" r="5" />

    <circle cx="300" cy="220" r="4" />
    <circle cx="500" cy="500" r="3" />
    <circle cx="700" cy="800" r="4" />
    <circle cx="2000" cy="800" r="4" />
  </g>

  <!-- Animated Data Streams -->
  <path d="M-100 200 C 300 100, 500 500, 800 300" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="10, 150" stroke-linecap="round" filter="url(#blurNeon)" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="160" to="0" dur="2.5s" repeatCount="indefinite" />
  </path>
  <path d="M800 300 S 1400 100, 1600 400" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8, 200" stroke-linecap="round" filter="url(#blurNeon)" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="208" to="0" dur="3s" repeatCount="indefinite" />
  </path>
</svg>
