<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#022c22" />
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>

  <g transform="translate(50, 50)">
    <!-- Order Card 1 -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="300" height="60" rx="12" fill="#064e3b">
        <animate attributeName="y" values="0;-5;0" dur="4s" repeatCount="indefinite" />
      </rect>
      <rect x="20" y="20" width="40" height="20" rx="4" fill="#10b981" opacity="0.8" />
      <rect x="80" y="20" width="120" height="8" rx="4" fill="#34d399" />
      <rect x="80" y="36" width="80" height="4" rx="2" fill="#059669" />
      <circle cx="260" cy="30" r="12" fill="#a7f3d0" opacity="0.2" />
      <circle cx="260" cy="30" r="6" fill="#34d399">
        <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- Order Card 2 -->
    <g filter="url(#shadow)" transform="translate(0, 80)">
      <rect x="0" y="0" width="300" height="60" rx="12" fill="#064e3b">
        <animate attributeName="y" values="0;-5;0" dur="4s" begin="1s" repeatCount="indefinite" />
      </rect>
      <rect x="20" y="20" width="40" height="20" rx="4" fill="#10b981" opacity="0.8" />
      <rect x="80" y="20" width="140" height="8" rx="4" fill="#34d399" />
      <rect x="80" y="36" width="60" height="4" rx="2" fill="#059669" />
      <circle cx="260" cy="30" r="6" fill="#059669" />
    </g>

    <!-- Order Card 3 -->
    <g filter="url(#shadow)" transform="translate(0, 160)">
      <rect x="0" y="0" width="300" height="60" rx="12" fill="#064e3b">
        <animate attributeName="y" values="0;-5;0" dur="4s" begin="2s" repeatCount="indefinite" />
      </rect>
      <rect x="20" y="20" width="40" height="20" rx="4" fill="#10b981" opacity="0.8" />
      <rect x="80" y="20" width="100" height="8" rx="4" fill="#34d399" />
      <rect x="80" y="36" width="90" height="4" rx="2" fill="#059669" />
      <circle cx="260" cy="30" r="6" fill="#059669" />
    </g>

    <!-- Scanning Line -->
    <rect x="-10" y="-10" width="320" height="2" fill="#6ee7b7" opacity="0.8">
      <animate attributeName="y" values="-10;250;-10" dur="3s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
